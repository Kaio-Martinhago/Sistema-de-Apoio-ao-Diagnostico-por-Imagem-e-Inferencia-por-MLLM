<!DOCTYPE html>
<html lang="pt-br">
<!-- Use o mesmo <head> do dashboard com o Bootstrap -->
<head>
    <meta charset="UTF-8"><title>Novo Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h4 class="mb-4 text-primary">Cadastro de Paciente</h4>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary">Salvar Paciente</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
