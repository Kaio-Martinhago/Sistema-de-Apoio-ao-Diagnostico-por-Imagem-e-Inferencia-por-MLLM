{% extends 'conta/base.html' %}

{% block title %}Novo Paciente | SADI-AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-sadi p-4">
            <h4 class="mb-4 fw-bold text-dark"><i class="fa-solid fa-user-plus me-2 text-primary"></i>Cadastro de Paciente</h4>
            <form method="post" id="formCadastroPaciente">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-between mt-4 border-top pt-3">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary px-4">Salvar Paciente</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // O Django gera os IDs dos forms baseados nos nomes. "id_cpf" e "id_telefone".
        const cpfInput = document.getElementById('id_cpf');
        const telInput = document.getElementById('id_telefone');

        // MÁSCARA DO CPF
        if (cpfInput) {
            cpfInput.setAttribute('maxlength', '14'); // Limita a quantidade de dígitos no HTML
            cpfInput.addEventListener('input', function() {
                let v = this.value.replace(/\D/g, ""); // Remove tudo que NÃO é número
                if (v.length > 11) v = v.slice(0, 11); // Trava em 11 números reais
                // Aplica a formatação visual
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                this.value = v;
            });
        }

        // MÁSCARA DO TELEFONE
        if (telInput) {
            telInput.setAttribute('maxlength', '15');
            telInput.addEventListener('input', function() {
                let v = this.value.replace(/\D/g, "");
                if (v.length > 11) v = v.slice(0, 11);
                v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
                v = v.replace(/(\d)(\d{4})$/, "$1-$2");
                this.value = v;
            });
        }

        // LIMPEZA ANTES DE ENVIAR PRO BANCO DE DADOS
        document.getElementById('formCadastroPaciente').addEventListener('submit', function() {
            // Removemos os pontos e traços 1 milissegundo antes de enviar pro Django,
            // assim o seu banco de dados recebe os dados limpos como sempre!
            if (cpfInput) cpfInput.value = cpfInput.value.replace(/\D/g, "");
            if (telInput) telInput.value = telInput.value.replace(/\D/g, "");
        });
    });
</script>
{% endblock %}
