<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h4 class="mb-4 text-primary text-center">Cadastro de Corpo Clínico</h4>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Registrar e Acessar</button>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none">Já possuo cadastro</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
