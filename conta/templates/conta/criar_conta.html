<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | SADI-AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F4F7F9; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .register-wrapper { background: #fff; width: 100%; max-width: 500px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Forçamos todos os inputs do Django a ficarem com visual moderno */
        input[type="text"], input[type="email"], input[type="password"], select { 
            width: 100%; border-radius: 8px; padding: 10px 15px; border: 1px solid #E2E8F0; outline: none; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: #00D4B2; box-shadow: 0 0 0 3px rgba(0, 212, 178, 0.2); }
        
        .btn-primary { background-color: #0A2540; border: none; padding: 12px; border-radius: 8px; font-weight: 600; color: #fff; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #00D4B2; color: #0A2540; }

        /* Estilo customizado para os erros do Django ficarem profissionais */
        .errorlist { list-style-type: none; padding-left: 0; margin-bottom: 0; color: #DC2626; font-size: 0.85rem; font-weight: 500; margin-top: 6px; }
        .errorlist li::before { content: "\f071"; font-family: "Font Awesome 6 Free"; font-weight: 900; margin-right: 5px; }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark">Cadastro de Corpo Clínico</h4>
        <p class="text-muted small">Preencha os dados para acessar o SADI-AI</p>
    </div>
    
    <form method="post" id="formCriarConta">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label text-dark fw-medium small mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    {{ field.errors }}
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary w-100 mt-3 shadow-sm">Registrar e Acessar</button>
        <div class="text-center mt-4 border-top pt-3">
            <a href="{% url 'login' %}" class="text-decoration-none text-secondary fw-semibold small"><i class="fa-solid fa-arrow-left me-1"></i> Já possuo cadastro (Voltar)</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 1. MÁSCARA DO CRM
        const crmInput = document.getElementById('id_crm');
        if (crmInput) {
            crmInput.setAttribute('maxlength', '10');
            crmInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, ""); 
            });
        }

        const ufInput = document.getElementById('id_uf_crm'); 
        if (ufInput) {
            const selectUF = document.createElement('select');
            selectUF.name = ufInput.name;
            selectUF.id = ufInput.id;
            selectUF.required = ufInput.required;

            const estadosBR = [
                'AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 
                'MA', 'MT', 'MS', 'MG', 'PA', 'PB', 'PR', 'PE', 'PI', 
                'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'
            ];

            const opcaoPadrao = document.createElement('option');
            opcaoPadrao.value = '';
            opcaoPadrao.text = 'Selecione o UF';
            selectUF.appendChild(opcaoPadrao);

            const valorAtual = ufInput.value.toUpperCase();

            estadosBR.forEach(function(uf) {
                const opcao = document.createElement('option');
                opcao.value = uf;
                opcao.text = uf;
                if (uf === valorAtual) {
                    opcao.selected = true;
                }
                selectUF.appendChild(opcao);
            });

            ufInput.parentNode.replaceChild(selectUF, ufInput);
        }
    });
</script>
</body>
</html>
