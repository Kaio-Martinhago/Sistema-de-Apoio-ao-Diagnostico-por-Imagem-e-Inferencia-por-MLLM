<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Solicitar Exame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilo para a lista suspensa de resultados */
        #resultadosBusca {
            position: absolute; z-index: 1000; width: 100%;
            max-height: 200px; overflow-y: auto; display: none;
        }
        .resultado-item { cursor: pointer; }
        .resultado-item:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h4 class="mb-4 text-primary">Nova Solicitação de Exame</h4>
            
            <form method="post">
                {% csrf_token %}
                
                <!-- CAMPO DE BUSCA DINÂMICA -->
                <div class="mb-4 position-relative">
                    <label class="form-label fw-bold">Buscar Paciente (Nome ou CPF)</label>
                    <div class="input-group">
                        <input type="text" id="buscaPaciente" class="form-control" placeholder="Digite para buscar..." autocomplete="off">
                        <a href="{% url 'cadastro_paciente' %}" class="btn btn-outline-success">+ Novo</a>
                    </div>
                    
                    <!-- A lista suspensa onde o JS vai injetar os resultados -->
                    <ul id="resultadosBusca" class="list-group shadow"></ul>
                    
                    <!-- O campo oculto que realmente envia o ID do paciente para o Django -->
                    <input type="hidden" name="paciente_id_hidden" id="pacienteIdHidden" required>
                    <small id="pacienteSelecionado" class="text-success mt-1 d-block fw-bold"></small>
                </div>
                <hr>

                <!-- DEMAIS CAMPOS DO EXAME (Renderizados pelo Django) -->


                <div class="mb-3">
                    <label class="form-label fw-bold">Médico Solicitante</label>
                    <!-- Um input readonly apenas para feedback visual -->
                    <input type="text" class="form-control bg-light" value="{{ medico_logado.nome_completo }} (CRM: {{ medico_logado.crm }})" readonly>
                </div>


                {{ form.as_p }}
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Gerar Solicitação</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- SCRIPT DO AUTOCOMPLETE -->
<script>
    const inputBusca = document.getElementById('buscaPaciente');
    const listaResultados = document.getElementById('resultadosBusca');
    const inputHidden = document.getElementById('pacienteIdHidden');
    const textoSelecionado = document.getElementById('pacienteSelecionado');

    inputBusca.addEventListener('input', function() {
        const query = this.value;

        if (query.length < 1) {
            listaResultados.style.display = 'none';
            return; // Só busca se tiver 3 ou mais caracteres
        }

        // Faz a requisição na nossa API do Django
        fetch(`/api/buscar-pacientes/?q=${query}`)
            .then(response => response.json())
            .then(data => {
                listaResultados.innerHTML = ''; // Limpa a lista anterior
                if (data.length > 0) {
                    listaResultados.style.display = 'block';
                    data.forEach(paciente => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item resultado-item';
                        li.textContent = `${paciente.nome} (CPF: ${paciente.cpf})`;
                        
                        // Quando clica no nome, seleciona o paciente
                        li.onclick = () => {
                            inputBusca.value = paciente.nome;
                            inputHidden.value = paciente.id; // Guarda o ID no campo oculto
                            textoSelecionado.textContent = `✓ Selecionado: ${paciente.nome}`;
                            listaResultados.style.display = 'none';
                        };
                        listaResultados.appendChild(li);
                    });
                } else {
                    listaResultados.style.display = 'none';
                }
            });
    });

    // Esconde a lista se clicar fora dela
    document.addEventListener('click', function(e) {
        if (e.target !== inputBusca) {
            listaResultados.style.display = 'none';
        }
    });
</script>
</body>
</html>
